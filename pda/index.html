<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Route Assign</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#f5f4f1;--bg1:#ffffff;--bg2:#f0eeeb;--bg3:#e8e6e1;
  --border:#e2dfd9;--border2:#d4d0c8;--text:#1a1917;--text2:#4a4740;--muted:#9a9690;
  --accent:#c17b3f;--accent2:#e8956a;--green:#3a7d5c;--green-bg:#edf5f0;--green-bd:#c3ddd0;
  --red:#b84040;--red-bg:#fdf0f0;--red-bd:#e8c3c3;--yellow:#9a7020;--yel-bg:#fdf8ec;--yel-bd:#e8d8a0;
  --blue:#2e5fa3;--blue-bg:#eef3fc;--blue-bd:#bfd0ee;
  --purple:#6b3fa0;--purple-bg:#f3effe;--purple-bd:#d4b8f0;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow:0 4px 16px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04);
  --r:14px;--r2:10px;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:radial-gradient(ellipse 600px 400px at 80% 10%,rgba(193,123,63,0.06),transparent),radial-gradient(ellipse 500px 500px at 10% 80%,rgba(46,95,163,0.05),transparent);pointer-events:none;}
.shell{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:20px 16px 80px;display:flex;flex-direction:column;gap:12px;}

#flashOverlay{display:none;position:fixed;inset:0;z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .2s;}
#flashOverlay.show{display:flex;}
#flashOverlay.fade{opacity:0;}
.fl-icon{font-size:96px;line-height:1;}
.fl-label{font-size:36px;font-weight:700;color:#fff;letter-spacing:.5px;}
.fl-tno{font-family:var(--mono);font-size:14px;color:rgba(255,255,255,0.7);}
.fl-msg{font-family:var(--mono);font-size:13px;color:rgba(255,255,255,0.85);text-align:center;max-width:300px;line-height:1.5;}

#reloginModal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;padding:20px;}
#reloginModal.show{display:flex;}
.modal-box{background:var(--bg1);border-radius:var(--r);padding:24px;width:100%;max-width:340px;box-shadow:var(--shadow);}
.modal-title{font-size:15px;font-weight:600;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:16px;font-family:var(--mono);}
.modal-box input{margin-bottom:10px;}

.hdr{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;animation:fadeUp .4s ease both;}
.hdr-left{display:flex;align-items:center;gap:12px;}
.hdr-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 12px rgba(193,123,63,0.25);flex-shrink:0;}
.hdr-title{font-size:15px;font-weight:600;letter-spacing:-.2px;color:var(--text);}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px;font-family:var(--mono);}
.hdr-right{display:flex;align-items:center;gap:10px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .3s,box-shadow .3s;}
.status-dot.on{background:var(--green);box-shadow:0 0 0 3px rgba(58,125,92,.15);}
.status-dot.err{background:var(--red);box-shadow:0 0 0 3px rgba(184,64,64,.15);}
.logout-btn{font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:4px 9px;cursor:pointer;font-family:var(--sans);transition:all .15s;display:none;}
.logout-btn:hover{color:var(--red);border-color:var(--red-bd);background:var(--red-bg);}
.logout-btn.show{display:inline-block;}

.card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:18px;animation:fadeUp .4s ease both;}
.card-label{font-size:10px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.remember-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.remember-row input[type=checkbox]{width:auto;margin:0;}
.remember-row label{font-size:12px;color:var(--muted);cursor:pointer;}

input,textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);font-family:var(--sans);font-size:14px;padding:11px 13px;outline:none;transition:border-color .2s,box-shadow .2s,background .2s;-webkit-appearance:none;}
input::placeholder,textarea::placeholder{color:var(--muted);}
input:focus,textarea:focus{border-color:var(--accent);background:var(--bg1);box-shadow:0 0 0 3px rgba(193,123,63,0.12);}
.scan-input{width:100%;background:var(--bg2);border:2px solid var(--accent);border-radius:var(--r2);color:var(--text);font-family:var(--mono);font-size:18px;padding:12px 14px;min-height:50px;}
.blind-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.blind-row input{flex:1;font-family:var(--mono);font-size:12px;}
.route-bar{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:12px;flex-wrap:wrap;}
.route-bar .cnt{color:var(--green);font-weight:500;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--r2);font-family:var(--sans);font-weight:500;font-size:13px;padding:10px 18px;cursor:pointer;transition:all .18s;white-space:nowrap;letter-spacing:-.1px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn:active:not(:disabled){transform:scale(.97);}
.btn-primary{background:var(--text);color:#fff;box-shadow:var(--shadow-sm);}
.btn-primary:hover:not(:disabled){background:#2d2b28;box-shadow:var(--shadow);}
.btn-ghost{background:var(--bg2);color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover:not(:disabled){background:var(--bg3);}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px;}
.spin{display:none;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite;}
.spin.show{display:inline-block;}
@keyframes rot{to{transform:rotate(360deg);}}

.msg{display:none;margin-top:10px;font-size:12px;padding:9px 12px;border-radius:var(--r2);font-family:var(--mono);line-height:1.5;}
.msg.show{display:block;}
.msg.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
.msg.err{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
.msg.info{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd);}

.pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.pill{display:inline-flex;align-items:center;padding:4px 11px;border-radius:999px;font-size:11px;font-weight:500;font-family:var(--mono);border:1px solid transparent;letter-spacing:-.1px;}
.pill-blue{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd);}
.pill-green{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
.pill-red{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);}
.pill-yellow{background:var(--yel-bg);color:var(--yellow);border-color:var(--yel-bd);}
.pill-gray{background:var(--bg2);color:var(--muted);border-color:var(--border);}
.pill-purple{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd);}

.sec-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.sec-hdr-left{display:flex;align-items:center;gap:8px;}
.chev{font-size:10px;color:var(--muted);transition:transform .22s;}
.sec-hdr.col .chev{transform:rotate(-90deg);}
.coll{overflow:hidden;}
.coll.collapsed{display:none;}

.results{display:flex;flex-direction:column;gap:8px;}
.live-wrap{display:flex;flex-direction:column;gap:8px;}

.live-card{border-radius:var(--r2);border:1px solid var(--border);background:var(--bg1);overflow:hidden;box-shadow:var(--shadow-sm);}
.live-card.ok{border-color:var(--green-bd);background:#fafdfb;}
.live-card.warn{border-color:var(--red-bd);background:#fdfafa;}
.live-card.stored{border-color:var(--purple-bd);background:var(--purple-bg);}
.live-card.gray{border-color:var(--border);}

.ri-top{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 8px;gap:10px;}
.ri-tno{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tag{font-size:10px;font-weight:600;letter-spacing:.5px;padding:3px 9px;border-radius:999px;white-space:nowrap;flex-shrink:0;border:1px solid transparent;}
.tag-green{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
.tag-red{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);}
.tag-yellow{background:var(--yel-bg);color:var(--yellow);border-color:var(--yel-bd);}
.tag-gray{background:var(--bg2);color:var(--muted);border-color:var(--border);}
.tag-purple{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd);}

.ri-body{padding:0 14px 11px;display:flex;flex-direction:column;gap:4px;}
.kv{display:flex;align-items:baseline;gap:8px;}
.k{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--muted);min-width:64px;flex-shrink:0;letter-spacing:.3px;}
.v{font-family:var(--mono);font-size:12px;color:var(--text2);word-break:break-all;}
.v.g{color:var(--green);font-weight:500;}
.v.y{color:var(--yellow);}
.divider{height:1px;background:var(--border);margin:6px 0;}

.addr-box{margin-top:6px;padding:8px 11px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:8px;font-size:11px;color:var(--red);font-family:var(--mono);line-height:1.6;}
.manual-box{margin-top:6px;padding:8px 11px;background:var(--yel-bg);border:1px solid var(--yel-bd);border-radius:8px;font-size:11px;color:var(--yellow);font-family:var(--mono);line-height:1.6;font-weight:700;}
.storage-box{margin-top:6px;padding:10px 13px;background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:8px;font-size:13px;color:var(--purple);font-family:var(--mono);font-weight:700;letter-spacing:.8px;}

.sec-title{font-size:13px;font-weight:600;color:var(--text);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div id="flashOverlay">
  <div class="fl-icon" id="flIcon">✓</div>
  <div class="fl-label" id="flLabel">完成</div>
  <div class="fl-tno" id="flTno"></div>
  <div class="fl-msg" id="flMsg"></div>
</div>

<div id="reloginModal">
  <div class="modal-box">
    <div class="modal-title">登录已过期</div>
    <div class="modal-sub">请重新输入密码以继续</div>
    <input id="reloginPwd" type="password" placeholder="Password" autocomplete="current-password"/>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnRelogin">重新登录</button>
      <div class="spin" id="reloginSpin"></div>
    </div>
    <div class="msg" id="reloginMsg"></div>
  </div>
</div>

<div class="shell">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-icon">📦</div>
      <div>
        <div class="hdr-title">Route Assign</div>
        <div class="hdr-sub" id="hdrSub">未登录</div>
      </div>
    </div>
    <div class="hdr-right">
      <button class="logout-btn" id="btnLogout">登出</button>
      <div class="status-dot" id="dot"></div>
    </div>
  </div>

  <div class="card" id="loginCard">
    <div class="card-label">账号登录</div>
    <div class="row2">
      <input id="uname" placeholder="Username" autocomplete="username"/>
      <input id="pwd" type="password" placeholder="Password" autocomplete="current-password"/>
    </div>
    <div class="remember-row">
      <input type="checkbox" id="rememberMe"/>
      <label for="rememberMe">记住密码</label>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnLogin">登录</button>
      <div class="spin" id="loginSpin"></div>
    </div>
    <div class="msg" id="loginMsg"></div>
  </div>

  <div class="card" id="runCard" style="display:none">
    <div class="card-label">连续扫码</div>
    <div class="route-bar">
      路线表已加载 <span class="cnt" id="routeCnt">—</span> 条记录
      <button class="btn btn-ghost btn-sm" id="btnReload" style="margin-left:4px">重载</button>
    </div>
    <div style="font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Blind</div>
    <div class="blind-row"><input id="blindInput" placeholder="ATSUB-XXXX"/></div>
    <div style="font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">扫码</div>
    <input id="scanInput" class="scan-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="none" placeholder="扫码"/>
    <div class="btn-row"><button class="btn btn-ghost" id="btnClear">清空页面</button></div>
    <div class="msg" id="runMsg"></div>
  </div>

  <div id="resultsWrap" style="display:none">
    <div class="card" style="margin-bottom:0">
      <div class="sec-hdr" id="sumHdr"><div class="sec-hdr-left"><span class="sec-title">汇总</span></div><span class="chev">▼</span></div>
      <div class="coll" id="sumBody"><div class="pills" id="sumPills"></div></div>
    </div>

    <div style="height:8px"></div>

    <div class="card" style="margin-bottom:0">
      <div class="sec-hdr" id="okHdr">
        <div class="sec-hdr-left"><span class="sec-title">当前处理</span><span class="pill pill-green" id="okCnt">0</span></div>
        <span class="chev">▼</span>
      </div>
      <div class="coll" id="okBody"><div class="live-wrap" id="liveArea"></div></div>
    </div>

    <div style="height:8px"></div>

    <div class="card" style="margin-bottom:0">
      <div class="sec-hdr" id="wHdr">
        <div class="sec-hdr-left"><span class="sec-title" style="color:var(--red)">Wrong / 异常汇总</span><span class="pill pill-red" id="wCnt">0</span></div>
        <span class="chev">▼</span>
      </div>
      <div class="coll" id="wBody"><div class="results" id="wList"></div></div>
    </div>

    <div style="height:8px"></div>

    <div class="card" style="margin-bottom:0">
      <div class="sec-hdr" id="storedHdr">
        <div class="sec-hdr-left"><span class="sec-title" style="color:var(--purple)">Stored 汇总</span><span class="pill pill-purple" id="storedCnt">0</span></div>
        <span class="chev">▼</span>
      </div>
      <div class="coll" id="storedBody"><div class="results" id="storedList"></div></div>
    </div>

    <div style="height:8px"></div>

    <div class="card">
      <div class="sec-hdr" id="naHdr">
        <div class="sec-hdr-left"><span class="sec-title" style="color:var(--muted)">N / A</span><span class="pill pill-gray" id="naCnt">0</span></div>
        <span class="chev">▼</span>
      </div>
      <div class="coll" id="naBody"><div class="results" id="naList"></div></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

let pollTimer = null;
let collapseInited = false;
let finishedSet = new Set();
let submittedSet = new Set();
let lastFlashedTno = null;
let lastDoneTotal = 0;
let quietTimer = null;
let scanTimer = null;
let flashTimer = null;
let pollFailCount = 0;
let reloginPending = false;

// ── Saved credentials ─────────────────────────────────────────────────────────
function loadSaved(){
  try{
    const u=localStorage.getItem('ra_user')||'';
    const p=localStorage.getItem('ra_pass')||'';
    if(u){$('uname').value=u;$('rememberMe').checked=true;}
    if(p){$('pwd').value=p;}
  }catch(e){}
}
function saveCreds(u,p){try{localStorage.setItem('ra_user',u);localStorage.setItem('ra_pass',p);}catch(e){}}
function clearCreds(){try{localStorage.removeItem('ra_user');localStorage.removeItem('ra_pass');}catch(e){}}

// ── Helpers ───────────────────────────────────────────────────────────────────
function showMsg(el,txt,type){el.textContent=txt;el.className=`msg show ${type}`;}
function hideMsg(el){el.className='msg';}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Flash ─────────────────────────────────────────────────────────────────────
const FLASH={
  OK:            {bg:'#3a7d5c',icon:'✓',label:'完成'},
  WRONG_ADDRESS: {bg:'#b84040',icon:'✕',label:'Wrong Address'},
  WRONG_NO_BATCH:{bg:'#b84040',icon:'✕',label:'无 Blind 批次'},
  NO_MATCH:      {bg:'#9a7020',icon:'?',label:'无路线'},
  STORED:        {bg:'#6b3fa0',icon:'📦',label:'Stored'},
  DUPLICATE:     {bg:'#9a7020',icon:'!',label:'Duplicate'},
  NA:            {bg:'#6b6b6b',icon:'—',label:'N / A'},
  ERROR:         {bg:'#b84040',icon:'✕',label:'Error'},
};
function showFlash(type,tno,msg){
  if(flashTimer){clearTimeout(flashTimer);hideFlash();}
  const cfg=FLASH[type]||{bg:'#6b6b6b',icon:'…',label:'处理中'};
  const ov=$('flashOverlay');
  ov.style.background=cfg.bg;
  $('flIcon').textContent=cfg.icon;
  $('flLabel').textContent=cfg.label;
  $('flTno').textContent=tno||'';
  $('flMsg').textContent=msg||'';
  ov.style.opacity='1';ov.classList.remove('fade');ov.classList.add('show');
  ov.onclick=hideFlash;
  flashTimer=setTimeout(()=>{ov.classList.add('fade');setTimeout(hideFlash,220);},1500);
}
function hideFlash(){
  if(flashTimer){clearTimeout(flashTimer);flashTimer=null;}
  $('flashOverlay').classList.remove('show','fade');
}

// ── Re-login modal ────────────────────────────────────────────────────────────
function showRelogin(){
  if(reloginPending) return;
  reloginPending=true;
  stopPolling();
  try{
    const p=localStorage.getItem('ra_pass');
    if(p)$('reloginPwd').value=p;
  }catch(e){}
  $('reloginModal').classList.add('show');
  setTimeout(()=>$('reloginPwd').focus(),100);
}
function hideRelogin(){
  reloginPending=false;
  $('reloginModal').classList.remove('show');
}
async function doRelogin(){
  const p=$('reloginPwd').value;
  if(!p){showMsg($('reloginMsg'),'请输入密码','err');return;}
  $('btnRelogin').disabled=true;
  $('reloginSpin').classList.add('show');
  hideMsg($('reloginMsg'));
  try{
    const u=$('uname').value.trim()||localStorage.getItem('ra_user')||'';
    const j=await(await fetch('/api/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u,password:p})
    })).json();
    if(j.ok){
      if($('rememberMe').checked) saveCreds(u,p);
      hideRelogin();
      pollFailCount=0;
      ensurePolling();
      focusScanInput(100);
    }else{
      showMsg($('reloginMsg'),j.msg||'密码错误','err');
    }
  }catch(e){
    showMsg($('reloginMsg'),'网络错误','err');
  }
  $('btnRelogin').disabled=false;
  $('reloginSpin').classList.remove('show');
}

// ── Collapse ──────────────────────────────────────────────────────────────────
function initCollapse(hdrId,bodyId){
  $(hdrId).addEventListener('click',()=>{
    const body=$(bodyId),hdr=$(hdrId);
    const hiding=!body.classList.contains('collapsed');
    body.classList.toggle('collapsed',hiding);
    hdr.classList.toggle('col',hiding);
  });
}
function ensureCollapseInit(){
  if(collapseInited) return;
  ['sum','ok','w','stored','na'].forEach(k=>initCollapse(k+'Hdr',k+'Body'));
  collapseInited=true;
}

// ── Focus ─────────────────────────────────────────────────────────────────────
function focusScanInput(ms=30){
  setTimeout(()=>{
    const el=$('scanInput');
    if(!el) return;
    el.focus();
    try{el.select();}catch(e){}
  },ms);
}
function clearScanInput(){
  const el=$('scanInput');
  if(el) el.value='';
}

// ── Live card helpers ─────────────────────────────────────────────────────────
function getLiveCardEl(tno){
  return $('liveArea').querySelector(`[data-tno="${CSS.escape(tno)}"]`);
}

function addLiveCard(tno){
  const div=document.createElement('div');
  div.className='live-card gray';
  div.dataset.tno=tno;
  div.innerHTML=`
    <div class="ri-top">
      <div class="ri-tno">${escH(tno)}</div>
      <span class="tag tag-gray">⏳ 等待中</span>
    </div>
    <div class="ri-body">
      <div class="kv"><span class="k">status</span><span class="v" data-live-msg>等待处理中…</span></div>
      <div class="divider"></div>
      <div class="kv"><span class="k">msg</span><span class="v" style="color:var(--muted);font-size:11px">已提交到后台队列</span></div>
    </div>`;
  $('liveArea').prepend(div);
}

function needsManualReview(r){
  if(!r) return false;
  if(r.type === 'NO_MATCH') return true;
  if(r.type === 'ERROR') return true;
  return false;
}

function formatLiveMessage(r){
  let m = r.message || '处理完成';
  if(r.type === 'ERROR' && /Read timed out|HTTPSConnectionPool|timeout/i.test(m)){
    return '疑似 N/A, 接口超时，需要人工检查';
  }
  if(r.type === 'NO_MATCH'){
    return '无路线，需要人工检查';
  }
  if(r.type === 'ERROR'){
    return '处理失败，需要人工检查';
  }
  return m;
}

function updateLiveCard(r){
  const el=getLiveCardEl(r.tno);
  if(!el) return;

  let tagText='✓ 完成',tagClass='tag-green',cardClass='live-card ok';

  if(r.type==='WRONG_ADDRESS'){
    tagText='✕ Wrong Addr'; tagClass='tag-red'; cardClass='live-card warn';
  }else if(r.type==='WRONG_NO_BATCH'){
    tagText='✕ 无批次'; tagClass='tag-red'; cardClass='live-card warn';
  }else if(r.type==='NO_MATCH'){
    tagText='? 无路线'; tagClass='tag-yellow'; cardClass='live-card warn';
  }else if(r.type==='NA'){
    tagText='— NA'; tagClass='tag-gray'; cardClass='live-card gray';
  }else if(r.type==='DUPLICATE'){
    tagText='! Duplicate'; tagClass='tag-yellow'; cardClass='live-card gray';
  }else if(r.type==='STORED'){
    tagText='📦 Stored'; tagClass='tag-purple'; cardClass='live-card stored';
  }else if(r.type==='ERROR'){
    tagText='✕ Error'; tagClass='tag-red'; cardClass='live-card warn';
  }

  el.className=cardClass;

  const tagEl=el.querySelector('.tag');
  if(tagEl){
    tagEl.className=`tag ${tagClass}`;
    tagEl.textContent=tagText;
  }

  const msgEl=el.querySelector('[data-live-msg]');
  if(msgEl){
    msgEl.textContent = formatLiveMessage(r);
  }

  const body=el.querySelector('.ri-body');
  if(body){
    if(needsManualReview(r) && !body.querySelector('.manual-box')){
      const box=document.createElement('div');
      box.className='manual-box';
      box.textContent='⚠ 需要人工检查';
      body.insertBefore(box,body.querySelector('.divider'));
    }
    if(r.type==='STORED' && r.storage_info && !body.querySelector('.storage-box')){
      const box=document.createElement('div');
      box.className='storage-box';
      box.textContent='📍 '+r.storage_info;
      body.insertBefore(box,body.querySelector('.divider'));
    }
  }
}

// ── Full card builder ─────────────────────────────────────────────────────────
function buildFullCard(r){
  const isWrong=r.type==='WRONG_ADDRESS';
  const noB=r.type==='WRONG_NO_BATCH';
  const noMatch=r.type==='NO_MATCH';
  const isNA=r.type==='NA';
  const isDup=r.type==='DUPLICATE';
  const isStored=r.type==='STORED';
  const isErr=r.type==='ERROR';

  let cls='gray',tagLabel='—',tagCls='tag-gray';
  if(isWrong){cls='warn';tagLabel='✕ Wrong Addr';tagCls='tag-red';}
  else if(noB){cls='warn';tagLabel='✕ 无Blind批次';tagCls='tag-red';}
  else if(noMatch){cls='warn';tagLabel='? 无路线';tagCls='tag-yellow';}
  else if(isNA){tagLabel='— NA';tagCls='tag-gray';}
  else if(isDup){tagLabel='! Duplicate';tagCls='tag-yellow';}
  else if(isStored){cls='stored';tagLabel='📦 Stored';tagCls='tag-purple';}
  else if(isErr){cls='warn';tagLabel='✕ Error';tagCls='tag-red';}

  let manualHint='';
  if(noMatch || isErr){
    manualHint=`<div class="manual-box">⚠ 需要人工检查</div>`;
  }

  let rows=`
    ${manualHint}
    <div class="kv"><span class="k">warehouse</span><span class="v">${escH(r.warehouse||'—')}</span></div>
    <div class="kv"><span class="k">zip</span><span class="v">${escH(r.zip||'—')}</span></div>
    <div class="kv"><span class="k">state</span><span class="v">${escH(r.state!=null?r.state:'—')}</span></div>
    <div class="kv"><span class="k">from</span><span class="v">${escH(r.from_driver!=null?r.from_driver:'—')}</span></div>
  `;

  if(isWrong){
    rows+=`<div class="kv"><span class="k">→ blind</span><span class="v g">${escH(r.batch_no||'—')}</span></div>`;
    if(r.to_driver) rows+=`<div class="kv"><span class="k">→ 998</span><span class="v g">${escH(r.to_driver)}</span></div>`;
    if(r.batch_name) rows+=`<div class="kv"><span class="k">batch</span><span class="v">${escH(r.batch_name)}</span></div>`;
    if(r.address) rows+=`<div class="addr-box">📍 ${escH(r.address)}<br>${escH(r.consignee||'')}</div>`;
  }

  if(noB && r.address){
    rows+=`<div class="addr-box">⚠ ${escH(r.address)}<br>${escH(r.consignee||'')}</div>`;
  }

  if(isStored){
    if(r.consignee) rows+=`<div class="kv"><span class="k">consignee</span><span class="v">${escH(r.consignee)}</span></div>`;
    rows+=r.storage_info
      ? `<div class="storage-box">📍 ${escH(r.storage_info)}</div>`
      : `<div class="kv"><span class="k">storage</span><span class="v" style="color:var(--muted)">—</span></div>`;
  }

  let msgText = r.message || '';
  if(isErr && /Read timed out|HTTPSConnectionPool|timeout/i.test(msgText)){
    msgText = '疑似 N/A, 接口超时，需要人工检查';
  }else if(noMatch){
    msgText = '无路线，需要人工检查';
  }else if(isErr){
    msgText = '处理失败，需要人工检查';
  }

  rows+=`<div class="divider"></div><div class="kv"><span class="k">msg</span><span class="v" style="color:var(--muted);font-size:11px">${escH(msgText)}</span></div>`;

  return `
    <div class="live-card ${cls}">
      <div class="ri-top">
        <div class="ri-tno">${escH(r.tno)}</div>
        <span class="tag ${tagCls}">${tagLabel}</span>
      </div>
      <div class="ri-body">${rows}</div>
    </div>
  `;
}

// ── Summary ───────────────────────────────────────────────────────────────────
function renderSummary(j){
  $('sumPills').innerHTML=`
    <span class="pill pill-blue">总 ${j.total||0}</span>
    <span class="pill pill-green">完成 ${j.done||0}</span>
    <span class="pill pill-yellow">处理中 ${(j.pending||0)+(j.processing||0)}</span>
    <span class="pill pill-red">Wrong ${j.wrong_cnt||0}</span>
    <span class="pill pill-purple">Stored ${j.stored_cnt||0}</span>
    <span class="pill pill-gray">NA ${j.na_cnt||0}</span>
    <span class="pill pill-gray">ERR ${j.err_cnt||0}</span>
  `;
  $('okCnt').textContent=(j.pending||0)+(j.processing||0);
  $('wCnt').textContent=j.wrong_cnt||0;
  $('storedCnt').textContent=j.stored_cnt||0;
  $('naCnt').textContent=j.na_cnt||0;
}

function renderExceptionLists(j){
  const res=Array.isArray(j.results)?j.results:[];
  $('wList').innerHTML=res
    .filter(r=>['WRONG_ADDRESS','WRONG_NO_BATCH','NO_MATCH','ERROR'].includes(r.type)&&r.status==='done')
    .map(buildFullCard)
    .join('');
  $('storedList').innerHTML=res
    .filter(r=>r.type==='STORED'&&r.status==='done')
    .map(buildFullCard)
    .join('');
  $('naList').innerHTML=res
    .filter(r=>r.type==='NA'&&r.status==='done')
    .map(buildFullCard)
    .join('');
}

// ── Polling ───────────────────────────────────────────────────────────────────
function settleOneResult(r){
  if(finishedSet.has(r.tno) || r.status !== 'done') return;
  finishedSet.add(r.tno);

  updateLiveCard(r);

  if(r.tno === lastFlashedTno){
    showFlash(r.type, r.tno, formatLiveMessage(r));
  }

  // 当前处理区只显示“现在这票”，done 后自动移走
  setTimeout(()=>{
    const el=getLiveCardEl(r.tno);
    if(el) el.remove();
  }, 1200);
}

function stopPolling(){
  if(pollTimer){
    clearInterval(pollTimer);
    pollTimer=null;
  }
}

function ensurePolling(){
  if(pollTimer || reloginPending) return;
  pollStatus();
  pollTimer=setInterval(pollStatus,1200);
}

function scheduleIdleDoneMessage(){
  if(quietTimer) clearTimeout(quietTimer);
  quietTimer=setTimeout(async()=>{
    try{
      const j=await(await fetch('/api/status')).json();
      const allDone=j.ok&&(j.queue_len||0)===0&&(j.pending||0)===0&&(j.processing||0)===0&&(j.total||0)>0;
      if(allDone&&(j.done||0)!==lastDoneTotal){
        lastDoneTotal=j.done||0;
        showMsg(
          $('runMsg'),
          `本轮处理完成 · 成功 ${j.ok_cnt||0} · Wrong ${j.wrong_cnt||0} · Stored ${j.stored_cnt||0} · ERR ${j.err_cnt||0} · NA ${j.na_cnt||0}`,
          'ok'
        );
      }
    }catch(e){}
  },1800);
}

async function pollStatus(){
  if(reloginPending) return;
  try{
    const resp=await fetch('/api/status');
    if(resp.status===401||resp.status===403){
      showRelogin();
      return;
    }
    const j=await resp.json();
    if(j.ok===false&&(j.msg||'').includes('未登录')){
      showRelogin();
      return;
    }
    if(!j.ok) return;

    pollFailCount=0;
    hideMsg($('runMsg'));
    $('resultsWrap').style.display='block';
    ensureCollapseInit();
    renderSummary(j);
    renderExceptionLists(j);

    if(Array.isArray(j.results)){
      for(const item of j.results) settleOneResult(item);
    }

    scheduleIdleDoneMessage();
  }catch(e){
    pollFailCount++;
    if(pollFailCount>=3){
      showMsg($('runMsg'),`网络不稳定，正在重试… (${pollFailCount})`,'err');
    }
  }
}

// ── Scan submit ───────────────────────────────────────────────────────────────
async function submitOneScan(raw){
  const tno=String(raw||'').trim();
  if(!tno) return;

  if(submittedSet.has(tno)){
    showMsg($('runMsg'),`已提交过: ${tno}`,'info');
    focusScanInput(30);
    return;
  }

  $('resultsWrap').style.display='block';
  ensureCollapseInit();

  // 强制先显示当前卡片，不等后端
  $('liveArea').innerHTML='';
  addLiveCard(tno);

  const minShowTime = 300;
  const start = Date.now();

  try{
    const blindResp = await fetch('/api/set_blind',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({blind_batch:$('blindInput').value.trim()})
    });
    if(!blindResp.ok){
      throw new Error('set_blind failed');
    }

    submittedSet.add(tno);
    lastFlashedTno=tno;
    ensurePolling();

    const enqueueResp = await fetch('/api/enqueue',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({tnos:tno})
    });

    if(!enqueueResp.ok){
      throw new Error(`enqueue failed: ${enqueueResp.status}`);
    }

    const j = await enqueueResp.json();
    if(!j.ok){
      submittedSet.delete(tno);
      const elapsed = Date.now() - start;
      const delay = Math.max(0, minShowTime - elapsed);
      setTimeout(()=>{
        const el=getLiveCardEl(tno);
        if(el) el.remove();
      }, delay);
      showMsg($('runMsg'),j.msg||'提交失败','err');
      focusScanInput(30);
      return;
    }

    hideMsg($('runMsg'));
    focusScanInput(30);

  }catch(e){
    submittedSet.delete(tno);
    const elapsed = Date.now() - start;
    const delay = Math.max(0, minShowTime - elapsed);
    setTimeout(()=>{
      const el=getLiveCardEl(tno);
      if(el) el.remove();
    }, delay);
    showMsg($('runMsg'),'网络错误: '+e.message,'err');
    focusScanInput(30);
  }
}

// ── Auth / reload / clear ─────────────────────────────────────────────────────
async function doLogin(){
  const u=$('uname').value.trim(),p=$('pwd').value;
  if(!u||!p){
    showMsg($('loginMsg'),'请输入账号密码','err');
    return;
  }
  $('btnLogin').disabled=true;
  $('loginSpin').classList.add('show');
  hideMsg($('loginMsg'));
  try{
    const j=await(await fetch('/api/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u,password:p})
    })).json();

    if(j.ok){
      if($('rememberMe').checked) saveCreds(u,p); else clearCreds();
      $('hdrSub').textContent=j.user||u;
      $('dot').className='status-dot on';
      $('btnLogout').classList.add('show');
      $('loginCard').style.display='none';
      $('runCard').style.display='block';
      $('routeCnt').textContent=j.route_cnt!=null?j.route_cnt.toLocaleString():'—';
      if(!j.route_ok) showMsg($('runMsg'),`路线表: ${j.route_msg}`,'err');
      focusScanInput(50);
    }else{
      showMsg($('loginMsg'),j.msg||'登录失败','err');
      $('dot').className='status-dot err';
    }
  }catch(e){
    showMsg($('loginMsg'),'网络错误','err');
  }
  $('btnLogin').disabled=false;
  $('loginSpin').classList.remove('show');
}

function doLogout(){
  stopPolling();
  hideFlash();
  if(quietTimer) clearTimeout(quietTimer);

  $('resultsWrap').style.display='none';
  ['liveArea','wList','storedList','naList','sumPills'].forEach(id=>$(id).innerHTML='');
  $('okCnt').textContent='0';
  $('wCnt').textContent='0';
  $('storedCnt').textContent='0';
  $('naCnt').textContent='0';

  finishedSet=new Set();
  submittedSet=new Set();
  lastFlashedTno=null;
  lastDoneTotal=0;
  collapseInited=false;
  pollFailCount=0;

  hideMsg($('runMsg'));

  $('runCard').style.display='none';
  $('loginCard').style.display='block';
  $('btnLogout').classList.remove('show');
  $('dot').className='status-dot';
  $('hdrSub').textContent='未登录';

  if(!$('rememberMe').checked){
    $('uname').value='';
    $('pwd').value='';
  }

  try{fetch('/api/clear',{method:'POST'});}catch(e){}
}

async function doReload(){
  $('btnReload').disabled=true;
  try{
    const j=await(await fetch('/api/reload_routes',{method:'POST'})).json();
    $('routeCnt').textContent=j.count!=null?j.count.toLocaleString():'?';
    showMsg($('runMsg'),j.msg,j.ok?'ok':'err');
  }catch(e){
    showMsg($('runMsg'),'重载失败','err');
  }
  $('btnReload').disabled=false;
  focusScanInput(30);
}

async function clearAll(){
  $('resultsWrap').style.display='none';
  ['liveArea','wList','storedList','naList','sumPills'].forEach(id=>$(id).innerHTML='');
  $('okCnt').textContent='0';
  $('wCnt').textContent='0';
  $('storedCnt').textContent='0';
  $('naCnt').textContent='0';

  finishedSet=new Set();
  submittedSet=new Set();
  lastFlashedTno=null;
  lastDoneTotal=0;
  collapseInited=false;
  pollFailCount=0;

  hideMsg($('runMsg'));
  hideFlash();
  if(quietTimer) clearTimeout(quietTimer);
  stopPolling();

  try{await fetch('/api/clear',{method:'POST'});}catch(e){}
  clearScanInput();
  focusScanInput(30);
}

// ── Events ────────────────────────────────────────────────────────────────────
$('btnLogin').addEventListener('click',doLogin);
$('btnLogout').addEventListener('click',doLogout);
$('btnReload').addEventListener('click',doReload);
$('btnClear').addEventListener('click',clearAll);
$('btnRelogin').addEventListener('click',doRelogin);
$('reloginPwd').addEventListener('keydown',e=>{if(e.key==='Enter')doRelogin();});

$('scanInput').addEventListener('input',()=>{
  if(scanTimer) clearTimeout(scanTimer);
  scanTimer=setTimeout(async()=>{
    const code=$('scanInput').value.trim();
    if(!code) return;
    await submitOneScan(code);
    clearScanInput();
    focusScanInput(20);
  },120);
});

$('scanInput').addEventListener('keydown',async(e)=>{
  if(e.key==='Enter'){
    e.preventDefault();
    if(scanTimer) clearTimeout(scanTimer);
    const code=$('scanInput').value.trim();
    if(!code) return;
    await submitOneScan(code);
    clearScanInput();
    focusScanInput(20);
  }
});

[$('uname'),$('pwd')].forEach(el=>{
  el.addEventListener('keydown',e=>{
    if(e.key==='Enter')doLogin();
  });
});

window.addEventListener('load',()=>{
  loadSaved();
  focusScanInput(100);
});
</script>
